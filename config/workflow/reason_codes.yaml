- code: rework_failed_review
  category: rework
  description: Review or verification found issues that require rework.
  allowed_on_transitions:
    - coding_to_rework_system_safety_stop
    - agent_review_to_rework_system_review_finished
    - ready_to_merge_to_rework_system_safety_stop
- code: rework_spec_gap
  category: rework
  description: Specification or planning gaps require a new pass.
  allowed_on_transitions:
    - planned_to_rework_system_safety_stop
    - rework_to_needs_spec_system_rework_routed
- code: rework_human_feedback
  category: rework
  description: Human feedback requires implementation changes before merge.
  allowed_on_transitions:
    - needs_human_decision_to_rework_human_decision_given
- code: rework_post_deploy_issue
  category: rework
  description: Deploy or monitoring found a regression or incident.
  allowed_on_transitions:
    - deploying_to_rework_system_safety_stop
    - monitoring_to_rework_system_safety_stop
- code: block_external_dependency
  category: blocked
  description: An external dependency prevents further execution.
  allowed_on_transitions:
    - planned_to_blocked_system_block_detected
    - ready_for_build_to_blocked_system_block_detected
    - agent_review_to_blocked_system_block_detected
    - blocked_to_ready_for_build_system_block_cleared
- code: integration_missing_credentials
  category: needs
  description: Integration credentials or secret slots are still missing.
  allowed_on_transitions:
    - triage_to_needs_input_system_input_required
    - needs_spec_to_needs_input_system_input_required
    - rework_to_needs_input_system_input_required
    - planned_to_needs_input_credential_required
    - planned_to_needs_input_system_input_required
    - ready_for_build_to_needs_input_system_input_required
- code: integration_vendor_console_required
  category: needs
  description: Human action is required in the vendor console before execution can continue.
  allowed_on_transitions:
    - triage_to_needs_input_system_input_required
    - needs_spec_to_needs_input_system_input_required
    - rework_to_needs_input_system_input_required
    - planned_to_needs_input_credential_required
    - planned_to_needs_input_system_input_required
    - ready_for_build_to_needs_input_system_input_required
- code: integration_invalid_scope
  category: blocked
  description: Granted vendor scopes do not satisfy the planned integration contract.
  allowed_on_transitions:
    - planned_to_blocked_system_block_detected
    - ready_for_build_to_blocked_system_block_detected
    - coding_to_blocked_system_block_detected
    - agent_review_to_blocked_system_block_detected
- code: integration_webhook_verification_failed
  category: blocked
  description: Webhook registration exists but signature verification or replay safety failed.
  allowed_on_transitions:
    - planned_to_blocked_system_block_detected
    - ready_for_build_to_blocked_system_block_detected
    - coding_to_blocked_system_block_detected
    - agent_review_to_blocked_system_block_detected
- code: integration_sandbox_unavailable
  category: blocked
  description: Vendor sandbox or integration lab is unavailable.
  allowed_on_transitions:
    - planned_to_blocked_system_block_detected
    - ready_for_build_to_blocked_system_block_detected
    - coding_to_blocked_system_block_detected
    - agent_review_to_blocked_system_block_detected
- code: integration_vendor_outage
  category: blocked
  description: The vendor platform or dependency is unavailable for the integration path.
  allowed_on_transitions:
    - planned_to_blocked_system_block_detected
    - ready_for_build_to_blocked_system_block_detected
    - coding_to_blocked_system_block_detected
    - agent_review_to_blocked_system_block_detected
- code: integration_rate_limit_lockout
