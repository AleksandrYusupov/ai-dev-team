    - ready_for_build_to_needs_input_system_input_required
- code: needs_provider_console_action
  category: needs
  description: A human must complete a provider-console action before the workflow may resume.
  allowed_on_transitions:
    - planned_to_needs_input_credential_required
    - planned_to_needs_input_system_input_required
    - ready_for_build_to_needs_input_system_input_required
- code: blocked_ci_outage
  category: blocked
  description: CI or a required verification service is unavailable.
  allowed_on_transitions:
