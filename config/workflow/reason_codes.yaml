    - agent_review_to_blocked_system_block_detected
- code: blocked_dependency_pending
  category: blocked
  description: Execution is waiting on an external dependency or upstream deliverable.
  allowed_on_transitions:
    - planned_to_blocked_system_block_detected
    - ready_for_build_to_blocked_system_block_detected
    - coding_to_blocked_system_block_detected
    - agent_review_to_blocked_system_block_detected
- code: blocked_waiting_external_merge
  category: blocked
  description: Another merge or external change must land before execution can continue safely.
  allowed_on_transitions:
    - ready_for_build_to_blocked_system_block_detected
    - coding_to_blocked_system_block_detected
    - agent_review_to_blocked_system_block_detected
- code: rework_integration_readiness_gap
  category: rework
  description: Integration readiness or onboarding assumptions were incorrect and require another implementation pass.
  allowed_on_transitions:
    - planned_to_rework_system_safety_stop
    - agent_review_to_rework_system_review_finished
- code: cancel_by_human
  category: cancel
  description: A human explicitly canceled the issue.
  allowed_on_transitions:
    - triage_to_canceled_human_cancel
    - needs_spec_to_canceled_human_cancel
    - needs_input_to_canceled_human_cancel
    - needs_human_decision_to_canceled_human_cancel
    - blocked_to_canceled_human_cancel
- code: duplicate_canonical_issue
  category: duplicate
  description: The issue maps to another canonical issue.
  allowed_on_transitions:
    - triage_to_duplicate_system_duplicate_detected
