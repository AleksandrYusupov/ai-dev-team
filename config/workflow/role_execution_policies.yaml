# Executable runtime subset only.
# The canonical target operating model, rollout waves, and visible-actor policy live in operating_model.yaml.
- owner_role: context_agent
  primary_provider: claude
  secondary_provider: codex
  fallback_triggers:
    - quota_exhausted
    - rate_limited_exhausted
    - auth_unavailable
    - provider_unhealthy
    - no_eligible_runner
  max_provider_failovers: 1
  mcp_profile_ref: repo_shared_default
  required_capabilities:
    - shared_mcp
    - context_pack_write
    - kb_read

