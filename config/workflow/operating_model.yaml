visible_linear_surface:
  primary_actor_role: orchestrator
  optional_future_linear_actors:
    - review_agent

human_owned_zones:
  - product_intent
  - architecture_sign_off
  - final_review_merge
  - protected_deploy
  - credential_ownership_vendor_console_actions

taxonomy:
  label_groups:
    type:
      - feature
      - bug
      - refactor
      - research
      - hotfix
      - release
      - integration
      - maintenance
      - provisioning
    risk:
      - low
      - medium
      - high
      - critical
    source:
      - founder
      - ask
      - monitoring
      - security
      - dependency
      - ops
    mode:
      - autonomous
      - mixed
      - manual
    human:
      - review
      - approve
      - decision
      - risk_signoff
      - credential_approval
  reason_code_groups:
    needs:
      - business_decision
      - missing_file
      - scope_clarification
      - credential_upload
      - scope_approval
      - oauth_consent
      - redirect_uri_registration
      - webhook_registration
      - provider_console_action
    blocked:
      - vendor_outage
      - sandbox_outage
      - ci_outage
      - dependency_pending
      - waiting_external_merge
      - invalid_scopes
      - webhook_verification_failure
      - token_revoked_no_recovery
      - broker_outage
    rework:
      - spec_gap
      - failed_review
      - post_deploy_issue
      - human_feedback
      - integration_readiness_gap
