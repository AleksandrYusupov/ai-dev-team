- role_id: orchestrator
  canonical_run_kind: null
  allowed_status_ownership:
    - planned
    - ready_for_build
    - coding
    - agent_review
    - blocked
    - needs_input
    - needs_human_decision
    - rework
  required_input_artifact_types:
    - plan_artifact
    - readiness_report
    - review_report
    - decision_summary
  required_output_artifact_types:
    - runner_requirement_profile
    - block_record
    - resume_condition
    - decision_summary
  human_gate_policy:
    mode: conditional
    required_human_owned_zones:
      - product_intent
      - architecture_sign_off
      - final_review_merge
      - protected_deploy
      - credential_ownership_vendor_console_actions
    notes: Enforces canonical human-owned zones and pause/resume gates.
  escalation_reason_codes:
    - block_runner_outage
    - blocked_ci_outage
    - blocked_dependency_pending
    - blocked_waiting_external_merge
    - needs_business_decision
    - needs_scope_clarification
  activation_mode: active

- role_id: intake_agent
  canonical_run_kind: null
  allowed_status_ownership:
    - triage
  required_input_artifact_types: []
  required_output_artifact_types:
    - intake_summary
    - repo_mapping_result
    - duplicate_link
    - operator_question
  human_gate_policy:
    mode: conditional
    required_human_owned_zones:
      - product_intent
    notes: Escalates ambiguous intent and low-confidence routing.
  escalation_reason_codes:
    - needs_business_decision
    - needs_missing_file
    - needs_scope_clarification
    - integration_missing_credentials
    - integration_vendor_console_required
  activation_mode: active

- role_id: context_agent
  canonical_run_kind: null
