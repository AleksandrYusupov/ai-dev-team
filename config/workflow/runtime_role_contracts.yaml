    - planned
    - ready_for_build
  required_input_artifact_types:
    - intake_summary
    - repo_mapping_result
  required_output_artifact_types:
    - context_pack
    - decision_summary
  human_gate_policy:
    mode: none
    required_human_owned_zones: []
    notes: Only escalates when source-of-truth inputs conflict or are missing.
  escalation_reason_codes:
    - needs_missing_file
    - blocked_dependency_pending
  activation_mode: defined_only

