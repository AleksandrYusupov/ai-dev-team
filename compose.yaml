services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_dev_team_postgres
    environment:
      POSTGRES_DB: ai_dev_team
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_dev_team"]
      interval: 5s
      timeout: 5s
      retries: 12

  temporal:
    image: temporalio/temporal:latest
    container_name: ai_dev_team_temporal
    command: ["server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"
      - "8233:8233"

volumes:
  pgdata:

